name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: CI gates
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Free runner disk space
        run: |
          echo "=== disk before ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/lib/jvm /usr/local/share/powershell /usr/share/swift /usr/local/share/chromium /usr/local/lib/node_modules /opt/microsoft /opt/google /usr/lib/firefox
          sudo docker image prune --all --force
          echo "=== disk after ==="
          df -h /

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache Postgres binaries (theseus)
        uses: actions/cache@v4
        with:
          path: ~/.theseus
          key: theseus-pg16.4.0-${{ runner.os }}-${{ runner.arch }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      # Temporary diagnostic per #1860: streams a 15s-interval free-space timeline into the live step log so the job's disk-appetite curve is measurable even on a failing run; remove after the disk tier closes.
      - name: Run CI gates
        run: |
          ( while true; do echo "[disk-probe] $(date -u +%T) avail=$(df --output=avail -h / | tail -1 | tr -d ' ')"; sleep 15; done ) &
          trap 'kill %1 2>/dev/null || true' EXIT
          just ci

      - name: Docs drift gate
        run: just docs-check
