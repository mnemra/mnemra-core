name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Coverage sharding (R-0093-R-0098, docs/specs/2026-07-15-ci-coverage-shard.md):
# the CI coverage gate intermittently failed with "No space left on device"
# on GitHub's mixed hosted-runner fleet — the workflow cannot select which
# disk-size variant it draws, and the instrumented binary set `cargo
# llvm-cov` builds was the dominant disk consumer of the whole run. Fix
# (Shape B, LOCKED — see the spec's "load-bearing decision" section):
# coverage runs as its own separate jobs below (coverage-pg, coverage-rest),
# each on a fresh runner disk, each emitting its own per-shard number. The
# main "CI gates" job no longer runs coverage at all (`just ci
# _ci-verify-chain-nocoverage`) — every other gate (type/lint/test/
# test-hooks/build/smoke/signing-root) is unchanged (R-0098). No billed or
# larger-disk runners, no upload-artifact/download-artifact Action added
# (R-0097).
jobs:
  ci:
    name: CI gates
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Free runner disk space
        run: |
          echo "=== disk before ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/lib/jvm /usr/local/share/powershell /usr/share/swift /usr/local/share/chromium /usr/local/lib/node_modules /opt/microsoft /opt/google /usr/lib/firefox
          sudo docker image prune --all --force
          echo "=== disk after ==="
          df -h /

      # This job no longer runs coverage (moved to the coverage-pg /
      # coverage-rest jobs, R-0094), so it needs only clippy + rustfmt for
      # verify-lint and the wasm target for the plugin build — NOT
      # llvm-tools-preview (coverage-only tooling now lives in the shard jobs).
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache Postgres binaries (theseus)
        uses: actions/cache@v4
        with:
          path: ~/.theseus
          key: theseus-pg16.4.0-${{ runner.os }}-${{ runner.arch }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      # Coverage moved to its own jobs below (coverage-pg / coverage-rest,
      # R-0094) — this job runs every other gate (R-0098). No disk probe
      # needed here: this job is no longer coverage-instrumented, so it never
      # carried the disk-appetite that made the probe (R-0093) necessary.
      - name: Run CI gates (non-coverage)
        run: just ci _ci-verify-chain-nocoverage

      - name: Docs drift gate
        run: just docs-check

  coverage-pg:
    name: Coverage — PG shard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Free runner disk space
        run: |
          echo "=== disk before ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/lib/jvm /usr/local/share/powershell /usr/share/swift /usr/local/share/chromium /usr/local/lib/node_modules /opt/microsoft /opt/google /usr/lib/firefox
          sudo docker image prune --all --force
          echo "=== disk after ==="
          df -h /

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache Postgres binaries (theseus)
        uses: actions/cache@v4
        with:
          path: ~/.theseus
          key: theseus-pg16.4.0-${{ runner.os }}-${{ runner.arch }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.6

      # Roulette-detector probe (R-0093): present in every coverage-
      # instrumented job. Logs disk-TOTAL (classifies the smaller-/larger-
      # disk fleet variant this job drew) plus periodic avail samples for /
      # and /mnt, so this job's true minimum headroom is readable from the
      # log alone — the load-bearing evidence that this shard clears the
      # margin floor even on a smaller-variant draw (R-0094 AC, Verify
      # Contract item 2). Diagnostic only — changes no gate outcome.
      - name: Disk-total + headroom probe (R-0093)
        run: |
          echo "[disk-probe] runner disk-total:"
          df -h / 2>/dev/null || true
          if mountpoint -q /mnt 2>/dev/null; then
            df -h /mnt 2>/dev/null || true
          else
            echo "[disk-probe] /mnt is not a distinct mount on this runner"
          fi

      - name: Run coverage shard (PG)
        run: |
          probe() {
            while true; do
              ts="$(date -u +%T)"
              echo "[disk-probe] ${ts} avail /=$(df --output=avail -h / | tail -1 | tr -d ' ')"
              if mountpoint -q /mnt 2>/dev/null; then
                echo "[disk-probe] ${ts} avail /mnt=$(df --output=avail -h /mnt | tail -1 | tr -d ' ')"
              fi
              sleep 15
            done
          }
          probe &
          trap 'kill %1 2>/dev/null || true' EXIT
          just verify-coverage-pg

  coverage-rest:
    name: Coverage — rest shard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Free runner disk space
        run: |
          echo "=== disk before ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost /usr/lib/jvm /usr/local/share/powershell /usr/share/swift /usr/local/share/chromium /usr/local/lib/node_modules /opt/microsoft /opt/google /usr/lib/firefox
          sudo docker image prune --all --force
          echo "=== disk after ==="
          df -h /

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      # Postgres binary cache (theseus) — required here too, unlike the rest
      # of this shard's NONPG_TEST_FLAGS members. `-p mnemra-host --lib`
      # includes exactly one live-DB test (write_path.rs,
      # clean_write_commits_state_and_flushes_exactly_one_audit_row —
      # deliberately the ONLY `--lib` test that boots an engine) that calls
      # `EmbeddedEngine::start()`. `verify_pinned_artifacts()` hash-checks the
      # installed Postgres binary AND the pgvector shared library BEFORE
      # `install_pgvector()` ever runs (engine.rs bootstrap sequence,
      # steps 2 vs 4) — so on a cold `~/.theseus` with no prior PG-touching
      # test in this job to have installed pgvector first, that check fails
      # with a hash-pin "no such file" error (the pgvector library was never
      # written). Restoring the same cache the coverage-pg job warms carries
      # the already-installed pgvector artifact into this job, closing the
      # gap. Found via CI failure on this job (dispatch 1626): the pre-shard
      # single job never hit this because its PG_TEST_FLAGS pass always ran
      # before `-p mnemra-host --lib` in the same process/filesystem.
      - name: Cache Postgres binaries (theseus)
        uses: actions/cache@v4
        with:
          path: ~/.theseus
          key: theseus-pg16.4.0-${{ runner.os }}-${{ runner.arch }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.6

      # Roulette-detector probe (R-0093) — same rationale as the coverage-pg
      # job above; present in every coverage-instrumented job.
      - name: Disk-total + headroom probe (R-0093)
        run: |
          echo "[disk-probe] runner disk-total:"
          df -h / 2>/dev/null || true
          if mountpoint -q /mnt 2>/dev/null; then
            df -h /mnt 2>/dev/null || true
          else
            echo "[disk-probe] /mnt is not a distinct mount on this runner"
          fi

      - name: Run coverage shard (rest)
        run: |
          probe() {
            while true; do
              ts="$(date -u +%T)"
              echo "[disk-probe] ${ts} avail /=$(df --output=avail -h / | tail -1 | tr -d ' ')"
              if mountpoint -q /mnt 2>/dev/null; then
                echo "[disk-probe] ${ts} avail /mnt=$(df --output=avail -h /mnt | tail -1 | tr -d ' ')"
              fi
              sleep 15
            done
          }
          probe &
          trap 'kill %1 2>/dev/null || true' EXIT
          just verify-coverage-rest
