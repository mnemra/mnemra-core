[workspace]
resolver = "3"
members = [
    "cmd/mnemra",
    "plugins/mnemra-echo",
    "tools/mdbook-d2",
]
default-members = [
    "cmd/mnemra",
]

[workspace.package]
version = "0.0.1"
edition = "2024"
authors = ["Peter Manahan"]
license = "MIT"

[workspace.dependencies]
wasmtime = { version = "44", features = ["async", "component-model"] }
wasmtime-wasi = "44"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
anyhow = "1"
wit-bindgen = "0.57"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
